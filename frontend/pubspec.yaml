name: coco
description: 부산 로컬 골목 탐험 앱 — 2026 관광데이터 활용 공모전
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # 상태관리
  provider: ^6.1.1

  # 네트워크
  dio: ^5.4.0

  # 지도
  flutter_naver_map: ^1.2.0

  # 로케일 / 다국어
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0

  # 이미지
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7

  # 위치
  geolocator: ^11.0.0

  # 기타 UI
  go_router: ^13.2.0
  flutter_svg: ^2.0.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
